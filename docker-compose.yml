services:
  # ==========================================================================
  # Device Services (simulates Raspberry Pi)
  # ==========================================================================

  device:
    build:
      context: .
      dockerfile: device/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./device:/var/www/html
      - ./packages:/var/www/packages
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-0}"
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      APP_NAME: VibeLLMPC
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8081
      DB_CONNECTION: sqlite
      QUEUE_CONNECTION: database
      VIBELLMPC_CLOUD_URL: http://host.docker.internal:8082
      VIBELLMPC_CLOUD_BROWSER_URL: http://localhost:8082
      DEVICE_APP_PORT: 8080
      TUNNEL_ORIGIN_HOST: device
      DOCKER_HOST_PROJECTS_PATH: "${PWD}/device/storage/app/projects"
      SESSION_COOKIE: vibellmpc_device_session

  # ==========================================================================
  # AI Stack
  # ==========================================================================

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - ollama
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
    restart: unless-stopped

  # ==========================================================================
  # Infrastructure
  # ==========================================================================

  cloudflared:
    build:
      context: device/docker
      dockerfile: cloudflared.Dockerfile
    volumes:
      - ./device/docker/cloudflared-entrypoint.sh:/entrypoint.sh:ro
      - ./device/storage/tunnel:/tunnel:ro
    network_mode: "service:device"
    depends_on:
      device:
        condition: service_healthy
    restart: always

  device-scheduler:
    image: serversideup/php:8.4-fpm-nginx
    working_dir: /var/www/html
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - ./device:/var/www/html
      - ./packages:/var/www/packages
    environment:
      APP_NAME: VibeLLMPC
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8081
      DB_CONNECTION: sqlite
      QUEUE_CONNECTION: database
      VIBELLMPC_CLOUD_URL: http://host.docker.internal:8082
      VIBELLMPC_CLOUD_BROWSER_URL: http://localhost:8082
      DEVICE_APP_PORT: 8080
      TUNNEL_ORIGIN_HOST: device
    depends_on:
      - device

  device-queue:
    build:
      context: .
      dockerfile: device/Dockerfile
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "database", "--sleep=3", "--tries=1", "--timeout=540"]
    volumes:
      - ./device:/var/www/html
      - ./packages:/var/www/packages
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-0}"
    environment:
      APP_NAME: VibeLLMPC
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8081
      DB_CONNECTION: sqlite
      QUEUE_CONNECTION: database
      VIBELLMPC_CLOUD_URL: http://host.docker.internal:8082
      VIBELLMPC_CLOUD_BROWSER_URL: http://localhost:8082
      DEVICE_APP_PORT: 8080
      TUNNEL_ORIGIN_HOST: device
      DOCKER_HOST_PROJECTS_PATH: "${PWD}/device/storage/app/projects"
    depends_on:
      - device

  redis-device:
    image: valkey/valkey:8-alpine
    ports:
      - "6380:6379"
    restart: unless-stopped

volumes:
  ollama_data:
  open_webui_data:
  n8n_data:
  tunnel_token:
